apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      containers:
      - name: webhook
        image: europe-west1-docker.pkg.dev/devops-cert-labs/cloudbuild-images/webhook:1.0.0
        ports:
        - containerPort: 8080
        env:
        - name: HTTP_PORT
          value: "8080"