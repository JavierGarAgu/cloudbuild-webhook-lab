options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "europe-west1"
  _REPOSITORY: "cloudbuild-images"
  _IMAGE: "webhook"
  _CLUSTER: "cloudbuild-webhook-lab"
  _ZONE: "europe-west1-b"
  _NAMESPACE: "production"
  _WEBHOOK_URL: ""   # si no lo inyectas desde trigger, déjalo vacío o quítalo

steps:

# =========================
# BUILD IMAGE
# =========================
- name: gcr.io/cloud-builders/docker
  id: Build image
  args:
    - build
    - -t
    - europe-west1-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$SHORT_SHA
    - ./webhook

# =========================
# PUSH IMAGE
# =========================
- name: gcr.io/cloud-builders/docker
  id: Push image
  args:
    - push
    - europe-west1-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$SHORT_SHA

# =========================
# GET GKE CREDENTIALS
# =========================
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: Get cluster credentials
  entrypoint: gcloud
  args:
    - container
    - clusters
    - get-credentials
    - $_CLUSTER
    - --zone=$_ZONE
    - --project=$PROJECT_ID

# =========================
# DEPLOY TO GKE
# =========================
- name: gcr.io/cloud-builders/kubectl
  id: Deploy to GKE
  args:
    - apply
    - -f
    - k8s/
  env:
    - "CLOUDSDK_COMPUTE_ZONE=$_ZONE"
    - "CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER"

# =========================
# NOTIFY WEBHOOK (optional)
# =========================
# - name: curlimages/curl
#   id: Notify webhook
#   entrypoint: sh
#   args:
#     - -c
#     - |
#       curl -X POST "http://34.52.180.62:8080" \
#       -H "Content-Type: application/json" \
#       -d "{
#         \"project\": \"$PROJECT_ID\",
#         \"build\": \"$BUILD_ID\",
#         \"status\": \"SUCCESS\",
#         \"image\": \"$SHORT_SHA\"
#       }"

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$SHORT_SHA
